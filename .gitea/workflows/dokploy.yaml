name: Build and Deploy

on:
  push:
    branches: [main, release]

jobs:
  build-and-push-dockerfile-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Extract repository name
        shell: bash
        run: echo "REPO_NAME=$(echo '${{ gitea.repository }}' | cut -d'/' -f2)" >> $GITEA_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tag
        shell: bash
        run: |
          if [[ "${{ gitea.ref }}" == "refs/heads/release" ]]; then
            echo "DOCKER_TAG=prod" >> $GITEA_ENV
          else
            echo "DOCKER_TAG=latest" >> $GITEA_ENV
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            xyong/${{ env.REPO_NAME }}:${{ env.DOCKER_TAG }}
          platforms: linux/amd64

      - name: Dokploy Deployment (Test Environment)
        if: gitea.ref == 'refs/heads/main'
        uses: benbristow/dokploy-deploy-action@0.0.1
        with:
          auth_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_APPLICATION_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}

      - name: Dokploy Deployment (Production Environment)
        if: gitea.ref == 'refs/heads/release'
        uses: benbristow/dokploy-deploy-action@0.0.1
        with:
          auth_token: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          application_id: ${{ secrets.DOKPLOY_PROD_APPLICATION_ID }}
          dokploy_url: ${{ secrets.DOKPLOY_URL }}
